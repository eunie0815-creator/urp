name: reels-digest-daily

on:
  schedule:
    - cron: "0 22 * * *" # 22:00 UTC = 07:00 KST
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: reels-digest-daily
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/reels-digest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tools/reels-digest/package-lock.json

      - run: npm ci

      - name: Fetch + summarize + build snapshot
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run run

      - name: Commit new snapshot
        run: |
          git config user.name "reels-digest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/data
          git diff --cached --quiet || git commit -m "chore: daily reels digest snapshot $(date -u +%F)"
          git push

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: tools/reels-digest/site

      - id: deployment
        uses: actions/deploy-pages@v4
